// Produces a JS template-literal STRING (including its own backticks) that,
// when dropped into generated code, evaluates correctly at bot runtime.
function interpolate(str, varMap) {
  const raw = str == null ? '' : String(str);
  let escaped = raw.replace(/\\/g, '\\\\').replace(/`/g, '\\`').replace(/\$\{/g, '\\${');
  escaped = escaped.replace(/\{\{\s*([\w:]+)\s*\}\}/g, function (m, key) {
    if (Object.prototype.hasOwnProperty.call(varMap, key)) return '${' + varMap[key] + '}';
    return '';
  });
  return '`' + escaped + '`';
}

        if (script.event.config[k + 'Type'] === 'user') userOptions.push(n);
        else otherOptions.push(n);
      }
    });
  }
  return {
    eventType: script.event.type,
    hasMessage: meta.hasMessage, hasMember: meta.hasMember, hasUser: meta.hasUser,
    canReply: meta.canReply, canSame: meta.canSame,
    userOptions: userOptions, otherOptions: otherOptions,
    variables: variables.map(function (v) { return v.name; }).filter(Boolean),
  };
}

function generateScriptBody(script, variables) {
  const eventType = script.event.type;
  const refs = getRefs(eventType);
  const varMap = getVarMap(eventType, script.event.config, refs);
  let depth = 1;
  const lines = [];
  function push(s, d) { lines.push('  '.repeat(d === undefined ? depth : d) + s); }
 
  if (eventType === 'messageCreate') {
    if (script.event.config.ignoreBots !== false) push('if (message.author.bot) return;');
    const ft = script.event.config.filterType;
    if (ft && ft !== 'any') {
      const t = (script.event.config.filterText || '').toLowerCase();
      if (ft === 'contains') push('if (!message.content.toLowerCase().includes(' + JSON.stringify(t) + ')) return;');
      if (ft === 'equals') push('if (message.content.toLowerCase() !== ' + JSON.stringify(t) + ') return;');
      if (ft === 'startsWith') push('if (!message.content.toLowerCase().startsWith(' + JSON.stringify(t) + ')) return;');
    }
  }
  if (eventType === 'slashCommand') {
    push('if (!interaction.isChatInputCommand() || interaction.commandName !== ' + JSON.stringify(script.event.config.commandName || '') + ') return;');
  }
  if (eventType === 'messageReactionAdd') {
    push('if (reaction.partial) { try { await reaction.fetch(); } catch { return; } }');
    if (script.event.config.emojiFilter === 'specific') {
      push('if (reaction.emoji.name !== ' + JSON.stringify(script.event.config.emoji || '') + ') return;');
    }
    push('if (user.bot) return;');
    const needsMember = script.blocks.some(function (b) { return ['addRole', 'removeRole', 'kickMember', 'banMember', 'timeoutMember'].indexOf(b.type) !== -1; });
    if (needsMember) {
      push('const member = await reaction.message.guild.members.fetch(user.id).catch(() => null);');
      push('if (!member) return;');
    }
  }
 
  script.blocks.forEach(function (block) {
    const def = ACTION_DEFS[block.type];
    if (!def) return;
    if (block.type === 'ifEnd' || block.type === 'repeatEnd') depth = Math.max(1, depth - 1);
    const lineDepth = block.type === 'elseBlock' ? Math.max(1, depth - 1) : depth;
    const genLines = def.gen(block, eventType, refs, varMap);
    genLines.forEach(function (l) { push(l, lineDepth); });
    if (block.type === 'ifStart' || block.type === 'repeatStart') depth += 1;
  });
 
  return lines.join('\n');
}
 
function generateFullCode(scripts, variables, botName) {
  const intents = new Set(['GatewayIntentBits.Guilds']);
  const partialsNeeded = new Set();
  let needsGuildMembers = false, needsReactions = false, needsMessages = false;
  scripts.forEach(function (s) {
    if (s.event.type === 'messageCreate') needsMessages = true;
    if (s.event.type === 'messageReactionAdd') { needsReactions = true; needsMessages = true; }
    if (['guildMemberAdd', 'guildMemberRemove'].indexOf(s.event.type) !== -1) needsGuildMembers = true;
    s.blocks.forEach(function (b) { if (['addRole', 'removeRole', 'kickMember', 'banMember', 'timeoutMember'].indexOf(b.type) !== -1) needsGuildMembers = true; });
  });
  if (needsMessages) { intents.add('GatewayIntentBits.GuildMessages'); intents.add('GatewayIntentBits.MessageContent'); }
  if (needsReactions) {
    intents.add('GatewayIntentBits.GuildMessageReactions');
    partialsNeeded.add('Partials.Message'); partialsNeeded.add('Partials.Reaction'); partialsNeeded.add('Partials.User');
  }
  if (needsGuildMembers) intents.add('GatewayIntentBits.GuildMembers');
 
  const slashScripts = scripts.filter(function (s) { return s.event.type === 'slashCommand'; });
  const otherScripts = scripts.filter(function (s) { return s.event.type !== 'slashCommand' && s.event.type !== 'ready'; });
  const readyScripts = scripts.filter(function (s) { return s.event.type === 'ready'; });
 
  const slashCommandsCode = slashScripts.map(function (s) {
    const c = s.event.config;
    const opts = [];
    ['opt1', 'opt2'].forEach(function (k) {
      if (c[k + 'Name']) {
        const typeMap = { string: 'ApplicationCommandOptionType.String', integer: 'ApplicationCommandOptionType.Integer', user: 'ApplicationCommandOptionType.User' };
        opts.push('{ name: ' + JSON.stringify(c[k + 'Name']) + ', description: ' + JSON.stringify(c[k + 'Name']) + ', type: ' + typeMap[c[k + 'Type'] || 'string'] + ', required: ' + (!!c[k + 'Required']) + ' }');
      }
    });
    return '  { name: ' + JSON.stringify(c.commandName || 'command') + ', description: ' + JSON.stringify(c.description || 'A slash command') + ', options: [' + opts.join(', ') + '] }';
  }).join(',\n');
 
  const listenerBlocks = slashScripts.concat(otherScripts).map(function (s) {
    const evName = s.event.type === 'slashCommand' ? 'interactionCreate' : s.event.type;
    const body = generateScriptBody(s, variables);
    const params = s.event.type === 'slashCommand' ? 'interaction' :
      s.event.type === 'messageCreate' ? 'message' :
      s.event.type === 'guildMemberAdd' ? 'member' :
      s.event.type === 'guildMemberRemove' ? 'member' :
      s.event.type === 'messageReactionAdd' ? 'reaction, user' : '';
    return 'client.on(' + JSON.stringify(evName) + ', async (' + params + ') => {\n' + body + '\n});';
  }).join('\n\n');
 
  const readyBody = readyScripts.length ? generateScriptBody(readyScripts[0], variables) : '';
  const varsInit = variables.filter(function (v) { return v.name; }).map(function (v) { return '  ' + JSON.stringify(v.name) + ': ' + JSON.stringify(v.value || ''); }).join(',\n');
  const readyLogLine = '  console.log(' + JSON.stringify('✅ ' + (botName || 'Bot') + ' is online as ') + ' + client.user.tag);';
  const cmdLogLine = '    console.log(' + JSON.stringify('📋 Registered ') + ' + slashCommands.length + ' + JSON.stringify(' slash command(s).') + ');';
  const intentsArr = Array.from(intents);
  const partialsArr = Array.from(partialsNeeded);
 
  return 'const { Client, GatewayIntentBits, Partials, EmbedBuilder, ApplicationCommandOptionType } = require(\'discord.js\');\n' +
'require(\'dotenv\').config();\n\n' +
'// Built with the Discord Bot Builder\n' +
'const client = new Client({\n' +
'  intents: [' + intentsArr.join(', ') + '],' + (partialsArr.length ? '\n  partials: [' + partialsArr.join(', ') + '],' : '') + '\n' +
'});\n\n' +
'// Variables your bot remembers while it\'s running\n' +
'let botVars = {\n' +
varsInit + '\n' +
'};\n\n' +
'const slashCommands = [\n' +
slashCommandsCode + '\n' +
'];\n\n' +
'client.once(\'ready\', async () => {\n' +
readyLogLine + '\n' +
'  if (slashCommands.length > 0) {\n' +
'    for (const guild of client.guilds.cache.values()) {\n' +
'      try {\n' +
'        await guild.commands.set(slashCommands);\n' +
'      } catch (err) {\n' +
'        console.error(\'Could not register commands for\', guild.name, err);\n' +
'      }\n' +
'    }\n' +
cmdLogLine + '\n' +
'  }\n' +
readyBody + '\n' +
'});\n\n' +
listenerBlocks + '\n\n' +
'client.on(\'error\', console.error);\n' +
'client.login(process.env.DISCORD_TOKEN);\n';
}

  { key: 'base', bit: 1024 + 2048 + 65536, label: 'View Channels, Send Messages, Read Message History', always: true },
  { key: 'embed', bit: 16384, label: 'Embed Links', when: function (u) { return u.has('sendEmbed'); } },
  { key: 'react', bit: 64, label: 'Add Reactions', when: function (u) { return u.has('addReaction') || u.has('event:messageReactionAdd'); } },
  { key: 'manageMsgs', bit: 8192, label: 'Manage Messages (delete)', when: function (u) { return u.has('deleteMessage'); } },
  { key: 'roles', bit: 268435456, label: 'Manage Roles', when: function (u) { return u.has('addRole') || u.has('removeRole'); } },
  { key: 'kick', bit: 2, label: 'Kick Members', when: function (u) { return u.has('kickMember'); } },
  { key: 'ban', bit: 4, label: 'Ban Members', when: function (u) { return u.has('banMember'); } },
  { key: 'timeout', bit: 1099511627776, label: 'Moderate Members (timeout)', when: function (u) { return u.has('timeoutMember'); } },

function computePermissions(scripts) {
  const used = new Set();
  scripts.forEach(function (s) {
    used.add('event:' + s.event.type);
    s.blocks.forEach(function (b) { used.add(b.type); });
  });
  let total = 0;
  const list = PERMS.map(function (p) {
    const on = p.always || (p.when && p.when(used));
    if (on) total += p.bit;
    return { label: p.label, on: on };
  });
  return { total: total, list: list };
}
 
function validateScript(script) {
  const warnings = [];
  let ifDepth = 0, repeatDepth = 0;
  script.blocks.forEach(function (b) {
    if (b.type === 'ifStart') ifDepth += 1;
    if (b.type === 'ifEnd') ifDepth = Math.max(0, ifDepth - 1);
    if (b.type === 'repeatStart') repeatDepth += 1;
    if (b.type === 'repeatEnd') repeatDepth = Math.max(0, repeatDepth - 1);
  });
  if (ifDepth !== 0) warnings.push('An "If" block is missing its matching "End If".');
  if (repeatDepth !== 0) warnings.push('A "Repeat" block is missing its matching "End Repeat".');
  if (script.event.type === 'slashCommand') {
    const name = script.event.config.commandName || '';
    if (!/^[a-z0-9_-]{1,32}$/.test(name)) warnings.push('Command name should be lowercase letters, numbers, - or _, no spaces.');
  }
  return warnings;
}

   ============================================================ */
function copySourceText(which) {
  if (which === 'code') return generateFullCode(state.scripts, state.variables, state.botName);
  if (which === 'pkg') return generatePackageJson(state.botName);
  if (which === 'env') return 'DISCORD_TOKEN=paste_your_bot_token_here\n';
  if (which === 'readme') return generateReadme(state.botName, state.scripts);
  if (which === 'invite') {
    const cid = state.clientId.trim();
    if (!cid) return '';
    const permInfo = computePermissions(state.scripts);
    return 'https://discord.com/api/oauth2/authorize?client_id=' + encodeURIComponent(cid) + '&permissions=' + permInfo.total + '&scope=bot%20applications.commands';
  }
  return '';
}
 
async function copyToClipboard(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      return true;
    } catch (e2) {
      return false;
    }
  }
}
 
function downloadText(filename, content) {
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
 
async function handleCopy(btn) {
  const text = copySourceText(btn.dataset.copy);
  if (!text) return;
  const ok = await copyToClipboard(text);
  if (ok) {
    const original = btn.innerHTML;
    btn.innerHTML = icon('check', 13, '#fff') + ' Copied';
    btn.classList.add('btn-copied');
    setTimeout(function () { btn.innerHTML = original; btn.classList.remove('btn-copied'); }, 1400);
  }
}
function handleDownload(btn) {
  const text = copySourceText(btn.dataset.copy);
  downloadText(btn.dataset.file, text);
}
 
/* ============================================================
   FIELD CHANGE HANDLING
   ============================================================ */
function applyFieldChange(el) {
  const value = el.type === 'checkbox' ? el.checked : el.value;
 
  if (el.dataset.varId) {
    const v = state.variables.filter(function (x) { return x.id === el.dataset.varId; })[0];
    if (v) v[el.dataset.fieldKey] = value;
    return;
  }
  if (el.dataset.field === 'botName') { state.botName = value; return; }
  if (el.dataset.field === 'clientId') {
    state.clientId = value;
    const area = document.getElementById('invite-area');
    if (area) area.innerHTML = inviteAreaHTML(computePermissions(state.scripts));
    return;
  }
  if (el.dataset.fieldScript && el.dataset.fieldBlock) {
    const script = state.scripts.filter(function (s) { return s.id === el.dataset.fieldScript; })[0];
    const block = script && script.blocks.filter(function (b) { return b.id === el.dataset.fieldBlock; })[0];
    if (!block) return;
    block.config[el.dataset.fieldKey] = value;
    const def = ACTION_DEFS[block.type];
    if (def && def.preview) {
      const previewEl = document.getElementById('preview-' + block.id);
      if (previewEl) {
        const ctx = ctxFor(script, state.variables);
        previewEl.innerHTML = def.preview === 'message' ? messagePreviewHTML(block.config.text, ctx) : embedPreviewHTML(block.config, ctx);
      }
    }
    if (el.type === 'color') {
      const span = el.parentElement.querySelector('span');
      if (span) span.textContent = value;
    }
    return;
  }
  if (el.dataset.fieldScript) {
    const script = state.scripts.filter(function (s) { return s.id === el.dataset.fieldScript; })[0];
    if (script) script.event.config[el.dataset.fieldKey] = value;
    return;
  }
}
function matchesField(el) {
  return el.hasAttribute('data-field') || el.hasAttribute('data-field-key');
}
 
/* ============================================================
   EVENT WIRING
   ============================================================ */
function initEvents() {
  const app = document.getElementById('app');
 
  app.addEventListener('click', function (e) {
    if (e.target.classList && e.target.classList.contains('modal-overlay')) {
      closeAllModals(); render(); return;
    }
    const btn = e.target.closest('[data-act]');
    if (!btn) return;
    const act = btn.dataset.act;
 
    if (act === 'tab') { state.activeTab = btn.dataset.tab; render(); }
    else if (act === 'open-event-picker') { state.eventPickerOpen = true; render(); }
    else if (act === 'open-picker') { state.pickerOpen = true; render(); }
    else if (act === 'open-vars') { state.varsOpen = true; render(); }
    else if (act === 'close-modal') { closeAllModals(); render(); }
    else if (act === 'add-script') { addScript(btn.dataset.event); render(); }
    else if (act === 'load-template') { loadTemplate(btn.dataset.id); render(); }
    else if (act === 'select-script') { state.selectedScriptId = btn.dataset.id; render(); }
    else if (act === 'delete-script') { deleteScript(btn.dataset.id); render(); }
    else if (act === 'add-block') { addBlock(btn.dataset.type); render(); }
    else if (act === 'delete-block') { deleteBlock(btn.dataset.script, btn.dataset.block); render(); }
    else if (act === 'move-block') { moveBlock(btn.dataset.script, btn.dataset.block, parseInt(btn.dataset.dir, 10)); render(); }
    else if (act === 'add-var') { addVariable(); render(); }
    else if (act === 'delete-var') { deleteVariable(btn.dataset.id); render(); }
    else if (act === 'copy') { handleCopy(btn); }
    else if (act === 'download') { handleDownload(btn); }
  });
 
  app.addEventListener('input', function (e) {
    if (matchesField(e.target)) applyFieldChange(e.target);
  });
 
  app.addEventListener('change', function (e) {
    if (matchesField(e.target)) { applyFieldChange(e.target); render(); }
  });
 
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && (state.eventPickerOpen || state.pickerOpen || state.varsOpen)) {
      closeAllModals(); render();
    }
  });
}
 
render();
initEvents();
</script>
</body>
</html>
